<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sanggala Corridor Project</title>
  <link rel="icon" type="image/png" href="assets/icons/favicon.png">
  <style>
    :root {
      --color-cream: #FFFAF3;
      --color-sand: #DCDACC;
      --color-sage: #B5BBA9;
      --color-moss: #8C9F8B;
      --color-fern: #618273;
      --color-pine: #356760;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }
    body {
      background-color: var(--color-cream);
    }

    /* NAVBAR */
    .navbar {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 14px 32px;
      background-color: var(--color-cream);
      border-bottom: 1px solid var(--color-sand);
    }
    .navbar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-self: start;
    }
    .logo {
      width: 32px;
      height: 32px;
      object-fit: contain;
    }
    .brand-text {
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.5px;
      color: var(--color-pine);
    }
    .navbar-menu {
      display: flex;
      gap: 32px;
      justify-self: center;
    }
    .navbar-menu a {
      text-decoration: none;
      color: var(--color-fern);
      font-size: 14px;
      font-weight: 500;
    }
    .navbar-menu a:hover {
      color: var(--color-pine);
    }
    .navbar-spacer {
      justify-self: end;
    }

    /* HERO SECTION */
    .hero {
      position: relative;
      width: 100%;
      height: 90vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .hero-video {
      position: absolute;
      top: 50%;
      left: 50%;
      min-width: 100%;
      min-height: 100%;
      width: auto;
      height: auto;
      transform: translate(-50%, -50%);
      object-fit: cover;
      z-index: 0;
    }
    .hero-overlay {
      position: absolute;
      inset: 0;
      background: rgba(255, 250, 243, 0.55);
      z-index: 1;
    }
    .hero-content {
      position: relative;
      z-index: 2;
      text-align: center;
    }
    .hero-content h1 {
      font-size: 2.75rem;
      font-weight: 800;
      color: var(--color-pine);
    }

    /* SCROLL DOWN HINT */
    .scroll-hint {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      color: var(--color-pine);
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 0.5px;
      animation: bounce 2s infinite;
    }
    .scroll-hint svg {
      width: 20px;
      height: 20px;
    }
    @keyframes bounce {
      0%, 100% { transform: translate(-50%, 0); }
      50% { transform: translate(-50%, 8px); }
    }

    /* FOOTER STRIP (muncul saat discroll sedikit, seperti footer ArcGIS) */
    .footer-strip {
      width: 100%;
      height: 1.5cm;
      background-color: var(--color-sand);
      border-top: 1px solid var(--color-sage);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .footer-strip a {
      color: var(--color-pine);
      text-decoration: underline;
      font-size: 14px;
    }
    .footer-strip a:hover {
      color: var(--color-fern);
    }

    @media (max-width: 768px) {
      .navbar {
        grid-template-columns: auto auto;
      }
      .navbar-menu {
        gap: 16px;
        justify-self: end;
      }
      .navbar-spacer {
        display: none;
      }
      .hero-content h1 {
        font-size: 1.75rem;
        padding: 0 16px;
      }
    }
  </style>
</head>
<body>
  <!-- HEADER / NAVBAR -->
  <header class="navbar">
    <div class="navbar-brand">
      <img src="assets/logo/Sanggala_color.png" alt="Logo Sanggala Corridor Project" class="logo">
      <span class="brand-text">SANGGALA CORRIDOR PROJECT</span>
    </div>
    <nav class="navbar-menu">
      <a href="/dashboard/">Home</a>
      <a href="activities.html">Activities</a>
      <a href="list.html">Dashboard</a>
    </nav>
    <div class="navbar-spacer"></div>
  </header>

  <!-- HERO SECTION DENGAN VIDEO BACKGROUND -->
  <section class="hero">
    <video
      class="hero-video"
      autoplay
      muted
      loop
      playsinline
      poster="assets/images/hero-poster.jpg">
      <source src="assets/video/hero-bg.mp4" type="video/mp4">
      Browser Anda tidak mendukung video HTML5.
    </video>
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <h1>Sanggala Corridor Project</h1>
    </div>
    <a href="#embed" class="scroll-hint">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="6 9 12 15 18 9"></polyline>
      </svg>
    </a>
  </section>

  <!-- FOOTER STRIP -->
  <section class="footer-strip" id="embed">
    <a href="https://sanggala.id/" target="_blank" rel="noopener noreferrer">https://sanggala.id/</a>
  </section>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      console.log("Sanggala Corridor Project - halaman siap.");
    });
  </script>
</body>
</html>
