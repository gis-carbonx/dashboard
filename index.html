<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sanggala Corridor Project</title>
  <link rel="icon" type="image/png" href="assets/icons/favicon.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background-color: #fdf9f3;
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 32px;
      background-color: #ffffff;
      border-bottom: 1px solid #e5e0d8;
    }

    .navbar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 28px;
      height: 28px;
    }

    .brand-text {
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.5px;
      color: #1f2937;
    }

    .navbar-menu {
      display: flex;
      gap: 32px;
    }

    .navbar-menu a {
      text-decoration: none;
      color: #374151;
      font-size: 14px;
    }

    .navbar-menu a:hover {
      color: #d97757;
    }

    /* HERO SECTION */
    .hero {
      position: relative;
      width: 100%;
      height: 90vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero-video {
      position: absolute;
      top: 50%;
      left: 50%;
      min-width: 100%;
      min-height: 100%;
      width: auto;
      height: auto;
      transform: translate(-50%, -50%);
      object-fit: cover;
      z-index: 0;
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background: rgba(253, 249, 243, 0.55);
      z-index: 1;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      text-align: center;
    }

    .hero-content h1 {
      font-size: 2.75rem;
      font-weight: 800;
      color: #1f2937;
    }

    @media (max-width: 768px) {
      .navbar-menu {
        gap: 16px;
      }
      .hero-content h1 {
        font-size: 1.75rem;
        padding: 0 16px;
      }
    }
  </style>
</head>
<body>

  <!-- HEADER / NAVBAR -->
  <header class="navbar">
    <div class="navbar-brand">
      <img src="assets/logo/sanggala.png" alt="Logo Sanggala Corridor Project" class="logo">
      <span class="brand-text">SANGGALA CORRIDOR PROJECT</span>
    </div>
    <nav class="navbar-menu">
      <a href="index.html">Home</a>
      <a href="activities.html">Activities</a>
      <a href="dashboard.html">Dashboard</a>
    </nav>
  </header>

  <!-- HERO SECTION DENGAN VIDEO BACKGROUND -->
  <section class="hero">
    <video
      class="hero-video"
      autoplay
      muted
      loop
      playsinline
      poster="assets/logo/sanggala.jpg">
      <source src="assets/video/hero-bg.mp4" type="video/mp4">
      Browser Anda tidak mendukung video HTML5.
    </video>
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <h1>Sanggala Corridor Project</h1>
    </div>
  </section>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      console.log("Sanggala Corridor Project - halaman siap.");
    });
  </script>
</body>
</html>
